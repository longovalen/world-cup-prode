<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - World Cup Predictions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .prediction-details {
            font-size: 0.9em;
            color: #666;
        }

        .match-prediction {
            margin: 5px 0;
            padding: 5px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        .score {
            font-weight: bold;
            color: #667eea;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2em;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }

        .participant-row {
            cursor: pointer;
        }

        .expanded-details {
            background: #f8f9fa;
            padding: 15px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Admin Panel</h1>
        <p class="subtitle">World Cup Predictions Management</p>

        <div id="messageContainer"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalParticipants">0</div>
                <div class="stat-label">Participants</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalPredictions">0</div>
                <div class="stat-label">Total Predictions</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastSubmission">-</div>
                <div class="stat-label">Last Update</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, last name or IBM ID...">
            </div>
            <button class="btn btn-success" onclick="exportToExcel()">
                📊 Export to Excel
            </button>
            <button class="btn btn-primary" onclick="exportToCSV()">
                📄 Export to CSV
            </button>
            <button class="btn btn-secondary" onclick="refreshData()">
                🔄 Refresh
            </button>
            <button class="btn btn-danger" onclick="clearAllData()">
                🗑️ Clear Data
            </button>
        </div>

        <div class="table-container">
            <table id="predictionsTable">
                <thead>
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>IBM ID</th>
                        <th>Email</th>
                        <th>Submission Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div id="noData" class="no-data" style="display: none;">
                📭 No predictions registered yet
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Predictions Form</a>
        </div>
    </div>

    <script>
        // Password protection - Change this password to your own
        const ADMIN_PASSWORD = "admin2026";
        
        // Check password on page load
        (function() {
            const enteredPassword = prompt("🔐 Enter admin password:");
            if (enteredPassword !== ADMIN_PASSWORD) {
                alert("❌ Incorrect password. Access denied.");
                window.location.href = "index.html";
                return;
            }
        })();

        let allPredictions = [];
        let expandedRows = new Set();

        // Load data
        function loadData() {
            allPredictions = JSON.parse(localStorage.getItem('worldCupPredictions') || '[]');
            updateStats();
            renderTable(allPredictions);
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalParticipants').textContent = allPredictions.length;
            
            const totalPredictions = allPredictions.reduce((sum, p) => sum + p.predictions.length, 0);
            document.getElementById('totalPredictions').textContent = totalPredictions;

            if (allPredictions.length > 0) {
                const lastDate = new Date(allPredictions[allPredictions.length - 1].timestamp);
                document.getElementById('lastSubmission').textContent = lastDate.toLocaleDateString('en-US');
            }
        }

        // Render table
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const noData = document.getElementById('noData');

            if (data.length === 0) {
                tbody.innerHTML = '';
                noData.style.display = 'block';
                return;
            }

            noData.style.display = 'none';
            tbody.innerHTML = data.map((participant, index) => {
                const isExpanded = expandedRows.has(index);
                return `
                    <tr class="participant-row" onclick="toggleDetails(${index})">
                        <td>${participant.firstName}</td>
                        <td>${participant.lastName}</td>
                        <td>${participant.ibmId}</td>
                        <td>${participant.email || '-'}</td>
                        <td>${participant.submittedAt}</td>
                        <td>
                            <button class="btn btn-primary" style="padding: 6px 12px; font-size: 14px;" onclick="event.stopPropagation(); viewDetails(${index})">
                                👁️ View
                            </button>
                        </td>
                    </tr>
                    ${isExpanded ? `
                    <tr>
                        <td colspan="6" class="expanded-details">
                            <h4 style="margin-bottom: 15px;">Predictions by ${participant.firstName} ${participant.lastName}</h4>
                            <div class="detail-grid">
                                ${participant.predictions.map(pred => `
                                    <div class="match-prediction">
                                        <strong>${pred.team1}</strong> 
                                        <span class="score">${pred.score1} - ${pred.score2}</span> 
                                        <strong>${pred.team2}</strong>
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                    </tr>
                    ` : ''}
                `;
            }).join('');
        }

        // Toggle expanded details
        function toggleDetails(index) {
            if (expandedRows.has(index)) {
                expandedRows.delete(index);
            } else {
                expandedRows.add(index);
            }
            renderTable(allPredictions);
        }

        // View details
        function viewDetails(index) {
            toggleDetails(index);
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allPredictions.filter(p => 
                p.firstName.toLowerCase().includes(searchTerm) ||
                p.lastName.toLowerCase().includes(searchTerm) ||
                p.ibmId.toLowerCase().includes(searchTerm) ||
                (p.email && p.email.toLowerCase().includes(searchTerm))
            );
            renderTable(filtered);
        });

        // Export to Excel
        function exportToExcel() {
            if (allPredictions.length === 0) {
                showMessage('No data to export', 'info');
                return;
            }

            // Prepare data for Excel
            const excelData = [];
            
            allPredictions.forEach(participant => {
                participant.predictions.forEach(pred => {
                    excelData.push({
                        'First Name': participant.firstName,
                        'Last Name': participant.lastName,
                        'IBM ID': participant.ibmId,
                        'Email': participant.email || '',
                        'Submission Date': participant.submittedAt,
                        'Team 1': pred.team1,
                        'Team 1 Goals': pred.score1,
                        'Team 2': pred.team2,
                        'Team 2 Goals': pred.score2,
                        'Result': `${pred.score1}-${pred.score2}`
                    });
                });
            });

            // Create Excel workbook
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Predictions");

            // Download file
            const fileName = `world_cup_predictions_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);

            showMessage('✅ Excel file downloaded successfully', 'success');
        }

        // Export to CSV
        function exportToCSV() {
            if (allPredictions.length === 0) {
                showMessage('No data to export', 'info');
                return;
            }

            let csv = 'First Name,Last Name,IBM ID,Email,Submission Date,Team 1,Team 1 Goals,Team 2,Team 2 Goals,Result\n';
            
            allPredictions.forEach(participant => {
                participant.predictions.forEach(pred => {
                    csv += `"${participant.firstName}","${participant.lastName}","${participant.ibmId}","${participant.email || ''}","${participant.submittedAt}","${pred.team1}",${pred.score1},"${pred.team2}",${pred.score2},"${pred.score1}-${pred.score2}"\n`;
                });
            });

            // Download CSV
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `world_cup_predictions_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showMessage('✅ CSV file downloaded successfully', 'success');
        }

        // Refresh data
        function refreshData() {
            loadData();
            showMessage('✅ Data refreshed', 'success');
        }

        // Clear all data
        function clearAllData() {
            if (confirm('⚠️ Are you sure you want to delete ALL predictions? This action cannot be undone.')) {
                if (confirm('⚠️ FINAL CONFIRMATION: All data will be permanently deleted.')) {
                    localStorage.removeItem('worldCupPredictions');
                    allPredictions = [];
                    expandedRows.clear();
                    updateStats();
                    renderTable([]);
                    showMessage('✅ All data has been deleted', 'success');
                }
            }
        }

        // Show message
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
